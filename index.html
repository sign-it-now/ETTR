<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ETTR Fleet Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0f1e;color:#f1f5f9;min-height:100vh}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
select option{background:#1e293b}

/* Layout */
#sidebar{position:fixed;left:0;top:0;height:100vh;width:220px;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;z-index:50;transition:width .2s}
#sidebar.collapsed{width:60px}
#main{margin-left:220px;padding:24px;min-height:100vh;transition:margin .2s}
#sidebar.collapsed~#main{margin-left:60px}
@media(max-width:640px){#sidebar{width:60px}#sidebar~#main{margin-left:60px}}

/* Components */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden}
.card-p{padding:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;color:#fff}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:600;color:#fff;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-blue{background:#2563eb}
.btn-amber{background:#d97706}
.btn-slate{background:#475569}
.btn-green{background:#16a34a}
.btn-red{background:#dc2626}
.btn-emerald{background:#059669}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-md{padding:8px 16px;font-size:13px}
.btn-lg{padding:12px 24px;font-size:15px}
.btn-full{width:100%}
.inp-label{display:block;font-size:11px;color:#94a3b8;margin-bottom:4px}
.inp{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:13px;outline:none;font-family:inherit}
.inp:focus{border-color:#2563eb}
.stat-card{padding:16px}
.stat-label{font-size:11px;color:#64748b;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800}
.stat-sub{font-size:11px;color:#475569;margin-top:2px}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.flex{display:flex}.flex-col{flex-direction:column}.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}
.items-center{align-items:center}.items-start{align-items:flex-start}.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}
.wrap{flex-wrap:wrap}.flex1{flex:1}.shrink0{flex-shrink:0}
.w-full{width:100%}.text-right{text-align:right}.text-center{text-align:center}
.hidden{display:none!important}
.page-title{font-size:22px;font-weight:800}
.page-sub{color:#64748b;font-size:13px;margin-top:2px}
.section{display:flex;flex-direction:column;gap:16px}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-red{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.4);color:#f87171}
.alert-amber{background:rgba(180,83,9,.2);border:1px solid rgba(180,83,9,.4);color:#fbbf24}
.alert-orange{background:rgba(234,88,12,.15);border:1px solid rgba(234,88,12,.4);color:#fb923c;cursor:pointer}
.alert-blue{background:rgba(29,78,216,.15);border:1px solid rgba(29,78,216,.4);color:#93c5fd}
.divider{border:none;border-top:1px solid #1e293b;margin:12px 0}
.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}.fs14{font-size:14px}.fs16{font-size:16px}.fs18{font-size:18px}
.fw600{font-weight:600}.fw700{font-weight:700}.fw800{font-weight:800}
.c-slate{color:#64748b}.c-blue{color:#60a5fa}.c-green{color:#4ade80}.c-amber{color:#fbbf24}.c-red{color:#f87171}.c-orange{color:#fb923c}.c-purple{color:#c084fc}.c-white{color:#f1f5f9}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.p16{padding:16px}.p20{padding:20px}.p24{padding:24px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b;font-size:13px;flex-wrap:wrap;gap:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#1e293b;border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.nav-item{width:100%;display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:#94a3b8;transition:all .15s;text-align:left}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-item.active{background:#1d4ed8;color:#fff}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:8px;padding:4px;border:1px solid #334155;width:fit-content}
.tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:#64748b;font-family:inherit}
.tab.active{background:#334155;color:#fff}
.filter-pill{padding:6px 12px;border-radius:99px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:#1e293b;color:#64748b;font-family:inherit}
.filter-pill.active{background:#2563eb;color:#fff}
.load-item{padding:16px;cursor:pointer}
.load-item:hover{background:rgba(255,255,255,.02)}
.receipt-img{height:60px;border-radius:6px;border:1px solid #334155;object-fit:cover;cursor:pointer}
.sidebar-logo{font-weight:900;font-size:18px}
.sidebar-sub{color:#475569;font-size:11px}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.toggle-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;padding:4px}
.section-label{color:#334155;font-size:10px;font-weight:700;text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.check-box{width:32px;height:32px;border-radius:8px;border:2px solid #475569;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all .15s}
.check-box.checked{background:#16a34a;border-color:#16a34a}
.upload-zone{border:2px dashed #334155;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s}
.upload-zone:hover{border-color:#2563eb}
.status-badge{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;color:#fff}
</style>

</head>
<body>

<div id="app"></div>

<script>
// ── DATA & STATE ──────────────────────────────────────────────────────────────
const ROLES = {DEV:'developer',ADMIN:'carrier_admin',DRIVER:'driver'};
const EXPENSE_CATS = ['Fuel','Supplies','Parts','Repairs','Meals','Tolls','Lodging','Scale Fees','Lumper','Permits','Tools','Insurance','Registration','Other'];
const LOAD_STATUSES = ['Searching','Rate Pending','Confirmed','Dispatched','In Transit','Delivered','Billing','Paid','Cancelled'];
const STATUS_COLORS = {'Searching':'#475569','Rate Pending':'#b45309','Confirmed':'#1d4ed8','Dispatched':'#1d4ed8','In Transit':'#4338ca','Delivered':'#15803d','Billing':'#c2410c','Paid':'#065f46','Cancelled':'#b91c1c'};
const DOC_TYPES = ['IFTA Certificate','Form 2290 (HVUT)','W-9','Operating Authority','Certificate of Insurance','License Plate Registration','CDL Copy','Medical Examiner Certificate','Annual Inspection Report','Lease Agreement','Other'];
const SERVICE_TYPES = ['Oil Change','Filter Change','Tire Rotation','Tire Replacement','Brake Service','DOT Inspection','Annual Inspection','Wheel Seal','King Pin','Air Spring','Shock Absorber','3-Axle Alignment','Coolant System','Transmission Service','DEF System','Electrical','Reefer Service','General Repair','Other'];
const BROKERS = ['CNA Transportation','Coyote Logistics','Echo Global Logistics','GlobalTranz','Landstar','TQL','XPO Logistics','Other'];
const TRAILER_TYPES = ['Dry Van','Reefer','Flatbed','Step Deck','RGN','Tanker','Other'];
const US_STATES = ['AL','AR','AZ','CA','CO','CT','DE','FL','GA','IA','ID','IL','IN','KS','KY','LA','MA','MD','ME','MI','MN','MO','MS','MT','NC','ND','NE','NH','NJ','NM','NV','NY','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VA','VT','WA','WI','WV','WY'];

const INIT_USERS = [
  {id:'tim_smith',name:'Tim Smith',email:'tim@ettr.com',phone:'618-974-8695',password:'ettr2024',role:ROLES.DEV,carrierRole:'Lease Operator',cdl:'',cdlState:'IL',cdlExpiry:'',medCardExpiry:'',hireDate:'',address:'',emergencyContact:'',emergencyPhone:'',truckId:'pete_777',deleted:false},
  {id:'bruce_edgerton',name:'Bruce Edgerton',email:'bruce@ettr.com',phone:'',password:'ettr2024',role:ROLES.ADMIN,carrierRole:'Owner Operator',cdl:'',cdlState:'WI',cdlExpiry:'',medCardExpiry:'',hireDate:'',address:'Bonduel, WI',emergencyContact:'',emergencyPhone:'',truckId:'kw_bruce',deleted:false}
];
const INIT_TRUCKS = [
  {id:'pete_777',driverId:'tim_smith',make:'Peterbilt',model:'579',year:2013,color:'White',unit:'#777',vin:'1XP-BDP9X-3-ED234685',licensePlate:'',stateReg:'IL',eldProvider:'BlueInk Tech',mileage:996058.7,tires:{brand:'',size:'',frontTread:'',rearTread:''},brakes:{type:'Air Disc',brand:'',lastInspected:''},notes:''},
  {id:'kw_bruce',driverId:'bruce_edgerton',make:'Kenworth',model:'T680',year:null,color:'Blue',unit:'',vin:'',licensePlate:'',stateReg:'WI',eldProvider:'',mileage:0,tires:{brand:'',size:'',frontTread:'',rearTread:''},brakes:{type:'Air Drum',brand:'',lastInspected:''},notes:''}
];
const INIT_PC = [
  {id:'pc_mike001',description:"Mike's Inc - Truck #777 Major Repairs (Invoice #097919)",amount:15477.45,date:'2026-01-30',category:'Repairs',notes:"Full overhaul: kingpins, air springs, torque rods, radiator, trans cooler, shocks, DOT inspection, wheel seals, exhaust, power steering. Unit now passes DOT.",addedBy:'bruce_edgerton',forDriver:'tim_smith',paid:false,paidDate:null,paidMethod:null,receiptImage:null,receiptName:null,markedPaidByBruce:false,deleted:false}
];

function ls(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

const STATE = {
  user: null,
  page: 'dashboard',
  collapsed: window.innerWidth < 640,
  users: ls('ettr_users', INIT_USERS),
  trucks: ls('ettr_trucks', INIT_TRUCKS),
  pettyCash: ls('ettr_pc', INIT_PC),
  loads: ls('ettr_loads', []),
  trailers: ls('ettr_trailers', []),
  service: ls('ettr_service', []),
  documents: ls('ettr_docs', []),
  fuel: ls('ettr_fuel', []),
  eld: ls('ettr_eld', []),
};

function saveState(key){save('ettr_'+key, STATE[key]);}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).substr(2,9)+Date.now().toString(36);
const today = () => new Date().toISOString().split('T')[0];
const fmt$ = n => '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const daysUntil = d => d ? Math.ceil((new Date(d+'T12:00:00')-new Date())/86400000) : null;
const isAdmin = u => u && (u.role===ROLES.DEV||u.role===ROLES.ADMIN);
const isDev = u => u && u.role===ROLES.DEV;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function el(tag,attrs,inner){
  const a=Object.entries(attrs||{}).map(([k,v])=>` ${k}="${esc(v)}"`).join('');
  return `<${tag}${a}>${inner||''}</${tag}>`;
}
function inp(label,id,value,type='text',placeholder=''){
  return `<div><label class="inp-label" for="${id}">${label}</label><input class="inp" id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}"/></div>`;
}
function sel(label,id,value,options){
  const opts = options.map(o=>`<option value="${esc(o)}" ${o==value?'selected':''}>${esc(o)}</option>`).join('');
  return `<div><label class="inp-label" for="${id}">${label}</label><select class="inp" id="${id}"><option value="">Select...</option>${opts}</select></div>`;
}
function btn(label,onclick,cls='btn-blue btn-md'){return `<button class="btn ${cls}" onclick="${onclick}">${label}</button>`;}
function card(inner,cls=''){return `<div class="card ${cls}">${inner}</div>`;}
function badge(label,color='#475569'){return `<span class="badge" style="background:${color}">${esc(label)}</span>`;}
function statCard(label,value,sub,color='#60a5fa'){return card(`<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value" style="color:${color}">${esc(String(value))}</div>${sub?`<div class="stat-sub">${esc(sub)}</div>`:''}</div>`);}
function alert_(cls,inner){return `<div class="alert ${cls}">${inner}</div>`;}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML = STATE.user ? renderApp() : renderLogin();
  bindEvents();
}

function bindEvents(){
  // Delegate clicks
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click',()=>{STATE.page=el.dataset.page;render();});
  });
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',()=>handleAction(el.dataset.action,el.dataset));
  });
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',()=>{
      const target=document.getElementById(el.dataset.toggle);
      if(target) target.classList.toggle('hidden');
    });
  });
}

function handleAction(action, data){
  switch(action){
    case 'logout': STATE.user=null; STATE.page='dashboard'; render(); break;
    case 'toggle-sidebar': STATE.collapsed=!STATE.collapsed; render(); break;
    case 'login': doLogin(); break;
    case 'toggle-pw': {
      const pw=document.getElementById('login-pw');
      pw.type=pw.type==='password'?'text':'password';
      break;
    }
    case 'save-profile': saveProfile(); break;
    case 'save-truck': saveTruck(); break;
    case 'add-load': addLoad(); break;
    case 'update-load-status': updateLoadStatus(data.id, data.status); break;
    case 'delete-load': deleteLoad(data.id); break;
    case 'add-pc': addPettyCash(); break;
    case 'mark-paid': markPaid(data.id); break;
    case 'unmark-paid': unmarkPaid(data.id); break;
    case 'delete-pc': deletePc(data.id); break;
    case 'upload-receipt-cam': triggerReceiptUpload(data.id,'cam'); break;
    case 'upload-receipt-file': triggerReceiptUpload(data.id,'file'); break;
    case 'view-receipt': viewReceipt(data.id); break;
    case 'close-modal': document.querySelector('.modal-overlay')?.remove(); break;
    case 'add-service': addService(); break;
    case 'delete-service': deleteService(data.id); break;
    case 'add-fuel': addFuel(); break;
    case 'add-trailer': addTrailer(); break;
    case 'delete-trailer': deleteTrailer(data.id); break;
    case 'add-doc': addDoc(); break;
    case 'delete-doc': deleteDoc(data.id); break;
    case 'add-eld': addELD(); break;
    case 'add-user': addUser(); break;
    case 'toggle-user': toggleUser(data.id); break;
    case 'set-pc-filter': setPcFilter(data.val); break;
    case 'set-load-filter': setLoadFilter(data.val); break;
    case 'set-report-period': setReportPeriod(data.val); break;
    case 'expand-load': expandLoad(data.id); break;
  }
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  return `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#060e1f,#0a1628,#0f1f3d);padding:24px">
    <div style="width:100%;max-width:400px">
      <div class="text-center mb16">
        <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#1565c0,#0d47a1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px">🚛</div>
        <div style="font-size:36px;font-weight:900;letter-spacing:-1px">ETTR</div>
        <div style="color:#60a5fa;font-weight:600;margin:4px 0 2px">Fleet Management System</div>
        <div style="color:#475569;font-size:12px">Edgerton Truck &amp; Trailer Repair • Bonduel, WI • DOT 1978980</div>
      </div>
      ${card(`
        <div class="p24">
          <div class="fw700 fs18 mb16">Sign In</div>
          <div id="login-err" class="alert alert-red mb12 hidden"></div>
          <div class="flex flex-col gap12">
            ${inp('Email or Name','login-email','','text','Enter email or full name')}
            <div>
              <label class="inp-label">Password</label>
              <div style="position:relative">
                <input class="inp" id="login-pw" type="password" placeholder="Enter password" style="padding-right:36px"/>
                <button onclick="handleAction('toggle-pw',{})" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:16px">👁️</button>
              </div>
            </div>
            ${btn('Sign In →','handleAction(\'login\',{})','btn-blue btn-lg btn-full')}
          </div>
          <div style="margin-top:20px;padding-top:16px;border-top:1px solid #334155;text-align:center;color:#334155;font-size:11px">ETTR Fleet Management • DOT 1978980</div>
        </div>
      `)}
      <div style="text-align:center;color:#1e293b;font-size:11px;margin-top:16px">v2.0 • Built by Tim Smith</div>
    </div>
  </div>`;
}

function doLogin(){
  const email=(document.getElementById('login-email').value||'').toLowerCase().trim();
  const pw=document.getElementById('login-pw').value||'';
  const u=STATE.users.find(u=>!u.deleted&&u.password===pw&&(u.email.toLowerCase()===email||u.name.toLowerCase().includes(email)));
  const err=document.getElementById('login-err');
  if(u){STATE.user=u;STATE.page='dashboard';render();}
  else{err.textContent='Invalid email or password.';err.classList.remove('hidden');}
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function renderApp(){
  const u=STATE.users.find(x=>x.id===STATE.user.id)||STATE.user;
  return `
    <div id="sidebar" class="${STATE.collapsed?'collapsed':''}">
      ${renderSidebar(u)}
    </div>
    <div id="main">
      ${renderPage(u)}
    </div>`;
}

function renderSidebar(u){
  const c=STATE.collapsed;
  const isAdm=isAdmin(u);
  const isDv=isDev(u);
  const nav=(id,icon,label)=>`
    <button class="nav-item ${STATE.page===id?'active':''}" data-page="${id}">
      <span style="font-size:16px;flex-shrink:0">${icon}</span>
      ${c?'':'<span>'+label+'</span>'}
    </button>`;
  const grp=(label,items)=>`
    <div style="margin-bottom:12px">
      ${c?'':'<div class="section-label">'+label+'</div>'}
      ${items}
    </div>`;
  return `
    <div style="display:flex;align-items:center;justify-content:${c?'center':'space-between'};padding:16px 12px;border-bottom:1px solid #1e293b">
      ${c?'':'<div><div class="sidebar-logo">ETTR</div><div class="sidebar-sub">Fleet Mgmt</div></div>'}
      <button class="toggle-btn" data-action="toggle-sidebar">${c?'☰':'✕'}</button>
    </div>
    ${c?'':'<div style="padding:12px;border-bottom:1px solid #1e293b"><div class="flex items-center gap8"><div class="user-avatar" style="background:'+( u.id==='tim_smith'?'#475569':'#1d4ed8')+'">'+u.name[0]+'</div><div><div style="font-size:12px;font-weight:600">'+u.name+'</div><div style="font-size:11px;color:#64748b">'+(u.role===ROLES.DEV?'App Admin':u.role===ROLES.ADMIN?'Carrier Admin':'Driver')+'</div></div></div></div>'}
    <nav style="flex:1;overflow-y:auto;padding:8px">
      ${grp('Main',nav('dashboard','🏠','Dashboard')+nav('profile','👤','My Profile')+nav('truck','🚛','My Truck'))}
      ${grp('Operations',nav('loads','📦','Loads')+nav('petty_cash','💰','Petty Cash')+nav('fuel','⛽','Fuel & IFTA')+(u.id==='tim_smith'?nav('eld','🕐','ELD Logs'):''))}
      ${grp('Assets',nav('trailers','🔲','Trailers')+nav('service','🔧','Service Records')+nav('documents','🛡️','Documents'))}
      ${grp('Insights',nav('reports','📊','Reports'))}
      ${isAdm?grp('Management',nav('admin','⚙️',isDv?'System Admin':'Carrier Admin')):''}
    </nav>
    <div style="padding:8px;border-top:1px solid #1e293b">
      <button class="nav-item" data-action="logout">
        <span style="font-size:16px">🚪</span>
        ${c?'':'<span>Sign Out</span>'}
      </button>
    </div>`;
}

function renderPage(u){
  switch(STATE.page){
    case 'dashboard': return renderDashboard(u);
    case 'profile': return renderProfile(u);
    case 'truck': return renderTruck(u);
    case 'petty_cash': return renderPettyCash(u);
    case 'loads': return renderLoads(u);
    case 'trailers': return renderTrailers(u);
    case 'service': return renderService(u);
    case 'documents': return renderDocuments(u);
    case 'fuel': return renderFuel(u);
    case 'eld': return renderELD(u);
    case 'reports': return renderReports(u);
    case 'admin': return renderAdmin(u);
    default: return renderDashboard(u);
  }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(u){
  const myLoads=STATE.loads.filter(l=>!l.deleted&&(isAdmin(u)||l.driverId===u.id));
  const active=myLoads.filter(l=>!['Paid','Cancelled','Searching'].includes(l.status));
  const paid=myLoads.filter(l=>l.status==='Paid');
  const rev=paid.reduce((s,l)=>s+(parseFloat(l.rate)||0),0);
  const myTruck=STATE.trucks.find(t=>t.driverId===u.id);
  const timPc=STATE.pettyCash.filter(p=>!p.deleted&&p.forDriver==='tim_smith');
  const pcOwed=timPc.filter(p=>!p.paid).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const cdlDays=daysUntil(u.cdlExpiry);
  const medDays=daysUntil(u.medCardExpiry);
  const alerts=[
    cdlDays!==null&&cdlDays<60?alert_('alert-red',`🛡️ CDL expires in ${cdlDays} days!`):'',
    medDays!==null&&medDays<60?alert_('alert-red',`🛡️ Medical Card expires in ${medDays} days!`):'',
    pcOwed>0?`<div class="alert alert-orange" data-page="petty_cash" style="cursor:pointer"><span>${u.id==='tim_smith'?'💰 You owe Bruce':'💰 Tim owes you'} ${fmt$(pcOwed)}</span><span style="font-size:12px;text-decoration:underline;margin-left:auto">View →</span></div>`:'',
  ].filter(Boolean).join('');

  const truckInfo=myTruck?card(`<div class="p16"><div class="fw700 fs14 mb12">🚛 My Truck — ${esc(myTruck.make)} ${esc(myTruck.unit)}</div>
    ${[['Year',myTruck.year||'—'],['Mileage',myTruck.mileage?Number(myTruck.mileage).toLocaleString():'—'],['VIN',myTruck.vin||'—'],['ELD',myTruck.eldProvider||'—']].map(([k,v])=>`<div class="row"><span class="c-slate">${k}</span><span>${esc(String(v))}</span></div>`).join('')}
  </div>`):'';

  const loadsCard=card(`<div class="p16"><div class="fw700 fs14 mb12">📦 Active Loads</div>
    ${active.length===0?'<div class="c-slate fs13">No active loads</div>':
    active.slice(0,4).map(l=>`<div class="row"><div><div class="fw600 fs13">${esc(l.origin)} → ${esc(l.destination)}</div><div class="fs11 c-slate mt4">${esc(l.broker)}</div></div><div class="text-right">${badge(l.status,STATUS_COLORS[l.status])}<div class="c-green fw600 fs12 mt4">${fmt$(l.rate)}</div></div></div>`).join('')}
  </div>`);

  return `<div class="section">
    <div>
      <div style="font-size:24px;font-weight:800">Welcome back, ${esc(u.name.split(' ')[0])} 👋</div>
      <div class="c-slate fs13 mt4">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
    </div>
    ${alerts}
    <div class="grid4">
      ${statCard('Active Loads',active.length,'','#60a5fa')}
      ${statCard('Revenue',fmt$(rev),paid.length+' paid loads','#4ade80')}
      ${statCard(u.id==='tim_smith'?'You Owe Bruce':'Tim Owes You',fmt$(pcOwed),'','#fb923c')}
    </div>
    <div class="grid2">
      ${loadsCard}
      ${truckInfo}
    </div>
  </div>`;
}

  const t=STATE.trucks.find(x=>x.driverId===u.id)||STATE.trucks[0];
  if(!t)return;
  const fields={make:'tr-make',model:'tr-model',unit:'tr-unit',vin:'tr-vin',year:'tr-year',mileage:'tr-mileage',licensePlate:'tr-plate',stateReg:'tr-state',eldProvider:'tr-eld'};
  Object.entries(fields).forEach(([k,id])=>{const el=document.getElementById(id);if(el)t[k]=el.value;});
  if(!t.tires)t.tires={};
  ['brand','size','frontTread','rearTread'].forEach(k=>{const el=document.getElementById('tr-t'+k.toLowerCase().replace('tread','').slice(0,5));if(el)t.tires[k]=el.value;});
  t.tires.brand=document.getElementById('tr-tbrand')?.value;
  t.tires.size=document.getElementById('tr-tsize')?.value;
  t.tires.frontTread=document.getElementById('tr-tfront')?.value;
  t.tires.rearTread=document.getElementById('tr-trear')?.value;
  if(!t.brakes)t.brakes={};
  t.brakes.type=document.getElementById('tr-btype')?.value;
  t.brakes.lastInspected=document.getElementById('tr-binsp')?.value;
  save('ettr_trucks',STATE.trucks);
  render();
}

function addPettyCash(){
  const desc=document.getElementById('pc-desc')?.value?.trim();
  const amount=parseFloat(document.getElementById('pc-amount')?.value);
  if(!desc||!amount)return;
  const entry={id:uid(),description:desc,amount,date:document.getElementById('pc-date')?.value||today(),category:document.getElementById('pc-cat')?.value||'Repairs',notes:document.getElementById('pc-notes')?.value||'',addedBy:STATE.user.id,forDriver:'tim_smith',paid:false,paidDate:null,paidMethod:null,receiptImage:null,receiptName:null,markedPaidByBruce:false,deleted:false};
  STATE.pettyCash.unshift(entry);
  save('ettr_pc',STATE.pettyCash);
  window._pcShowAdd=false;
  render();
}
function markPaid(id){STATE.pettyCash=STATE.pettyCash.map(p=>p.id===id?{...p,paid:true,paidDate:today(),paidMethod:'Bruce marked paid',markedPaidByBruce:true}:p);save('ettr_pc',STATE.pettyCash);render();}
function unmarkPaid(id){STATE.pettyCash=STATE.pettyCash.map(p=>p.id===id?{...p,paid:false,paidDate:null,paidMethod:null,markedPaidByBruce:false}:p);save('ettr_pc',STATE.pettyCash);render();}
function deletePc(id){if(!confirm('Delete?')||!confirm('DOUBLE confirm?'))return;STATE.pettyCash=STATE.pettyCash.map(p=>p.id===id?{...p,deleted:true}:p);save('ettr_pc',STATE.pettyCash);render();}

function triggerReceiptUpload(id,type){
  const inputId=type==='cam'?'receipt-cam-input':'receipt-file-input';
  const input=document.getElementById(inputId);
  if(!input)return;
  input.value='';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      STATE.pettyCash=STATE.pettyCash.map(p=>p.id===id?{...p,receiptImage:ev.target.result,receiptName:file.name,paid:true,paidDate:today(),paidMethod:'Receipt uploaded by Tim'}:p);
      save('ettr_pc',STATE.pettyCash);render();
    };
    r.readAsDataURL(file);
  };
  input.click();
}

function viewReceipt(id){
  const item=STATE.pettyCash.find(p=>p.id===id);
  if(!item)return;
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal">
    <div class="flex justify-between items-center mb12"><div class="fw700 fs15">${esc(item.description)}</div><button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px">✕</button></div>
    <div class="fs11 c-slate mb12">${esc(item.receiptName||'')} • ${fmtDate(item.paidDate)}</div>
    ${item.receiptImage?.startsWith('data:image')?`<img src="${item.receiptImage}" style="width:100%;border-radius:8px" alt="receipt"/>`:
    `<div style="background:#0f172a;padding:32px;text-align:center;border-radius:8px;color:#64748b">📄 ${esc(item.receiptName||'File')}</div>`}
    <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-slate btn-md btn-full mt16">Close</button>
  </div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

if(!window._rptPeriod) window._rptPeriod='monthly';

function renderReports(u){
  const isAdm=isAdmin(u);
  const period=window._rptPeriod||'monthly';
  const year=window._rptYear;
  const month=window._rptMonth;
  const filterLoads=l=>{
    if(l.deleted)return false;
    if(!isAdm&&l.driverId!==u.id)return false;
    const d=new Date(((l.deliveryDate||l.pickupDate)||'2000-01-01')+'T12:00:00');
    if(period==='yearly')return d.getFullYear()===year;
    if(period==='monthly')return d.getFullYear()===year&&d.getMonth()+1===month;
    if(period==='weekly'){const n=new Date();return d>=(new Date(n-7*86400000));}
    if(period==='daily')return (l.deliveryDate||l.pickupDate)===today();
    return true;
  };
  const filtered=STATE.loads.filter(filterLoads);
  const paid=filtered.filter(l=>l.status==='Paid');
  const revenue=paid.reduce((s,l)=>s+(parseFloat(l.rate)||0),0);
  const miles=filtered.reduce((s,l)=>s+(parseFloat(l.miles)||0),0);
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return `<div class="section">
    <div class="page-title">📊 Reports</div>
    ${card(`<div class="p16 flex gap12 wrap items-end">
      <div>
        <div class="inp-label mb4">Period</div>
        <div class="flex gap4">
          ${['daily','weekly','monthly','yearly'].map(p=>`<button class="btn btn-sm ${period===p?'btn-blue':'btn-slate'}" data-action="set-report-period" data-val="${p}">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`).join('')}
        </div>
      </div>
      ${(period==='monthly'||period==='yearly')?sel('Year','rpt-year',String(year),['2024','2025','2026','2027']):''}
      ${period==='monthly'?sel('Month','rpt-month',String(month),MONTHS.map((_,i)=>String(i+1))):''}
    </div>`)}
    <div class="grid4">
      ${statCard('Revenue',fmt$(revenue),'','#4ade80')}
      ${statCard('Total Loads',filtered.length,paid.length+' paid','#60a5fa')}
      ${statCard('Miles',miles>0?miles.toLocaleString():0,'','#fbbf24')}
      ${statCard('Rev/Mile',miles>0?'$'+(revenue/miles).toFixed(2):'-','','#c084fc')}
    </div>
    ${card(`<div class="p20"><div class="fw700 fs14 mb12">Load Breakdown</div>
      ${filtered.length===0?'<div class="c-slate fs13">No loads in this period</div>':
      filtered.map(l=>`<div class="row"><div><div class="fw600 fs13">${esc(l.origin)} → ${esc(l.destination)}</div><div class="fs11 c-slate">${esc(l.broker)} • ${fmtDate(l.pickupDate)}</div></div><div class="flex gap8 items-center">${badge(l.status,STATUS_COLORS[l.status])}<div class="fw700 fs14 c-green">${fmt$(l.rate)}</div></div></div>`).join('')}
    </div>`)}
  </div>`;
}

  return `<div class="section">
    <div class="flex justify-between items-center wrap gap12">
      <div><div class="page-title">🔲 Trailers</div><div class="page-sub">${active.length} in fleet</div></div>
      ${isAdm?btn('+ Add Trailer','window._showAddTrailer=!window._showAddTrailer;render()','btn-blue btn-md'):''}
    </div>
    ${addForm}
    <div class="grid2">
      ${active.length===0?card(`<div class="p16 text-center c-slate">No trailers in fleet yet</div>`):''}
      ${active.map(t=>{
        const id=daysUntil(t.annualInspection);
        return card(`<div class="p16">
          <div class="flex justify-between mb12">
            <div><div class="fw800 fs18">${esc(t.number)}</div>${badge(t.type,'#1d4ed8')}</div>
            ${isDev(u)?`<button style="background:none;border:none;color:#475569;cursor:pointer" data-action="delete-trailer" data-id="${t.id}">🗑️</button>`:''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px">
            ${t.year?`<div><span class="c-slate">Year: </span>${esc(String(t.year))}</div>`:''}
            ${t.vin?`<div><span class="c-slate">VIN: </span>${esc(t.vin)}</div>`:''}
            ${t.plate?`<div><span class="c-slate">Plate: </span>${esc(t.plate)}</div>`:''}
            ${t.length?`<div><span class="c-slate">Length: </span>${esc(t.length)}ft</div>`:''}
          </div>
          ${t.annualInspection?`<div class="mt12 fs11" style="padding:6px 10px;border-radius:7px;background:${id!==null&&id<30?'rgba(185,28,28,.2)':id!==null&&id<90?'rgba(180,83,9,.2)':'rgba(255,255,255,.05)'};color:${id!==null&&id<30?'#f87171':id!==null&&id<90?'#fbbf24':'#64748b'}">📅 Inspection: ${fmtDate(t.annualInspection)} ${id!==null?'('+( id<0?'EXPIRED':id+' days')+')':''}</div>`:''}
        </div>`);
      }).join('')}
    </div>
  </div>`;
}

function addTrailer(){
  const num=document.getElementById('trl-num')?.value?.trim();
  if(!num)return;
  const t={id:uid(),number:num,type:document.getElementById('trl-type')?.value||'Dry Van',year:document.getElementById('trl-year')?.value||'',vin:document.getElementById('trl-vin')?.value||'',plate:document.getElementById('trl-plate')?.value||'',state:document.getElementById('trl-state')?.value||'',length:document.getElementById('trl-len')?.value||'53',annualInspection:document.getElementById('trl-insp')?.value||'',deleted:false};
  STATE.trailers.unshift(t);save('ettr_trailers',STATE.trailers);window._showAddTrailer=false;render();
}
function deleteTrailer(id){if(!confirm('Delete?')||!confirm('DOUBLE confirm?'))return;STATE.trailers=STATE.trailers.map(t=>t.id===id?{...t,deleted:true}:t);save('ettr_trailers',STATE.trailers);render();}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
if(!window._showAddUser) window._showAddUser=false;

function renderAdmin(u){
  const isDv=isDev(u);
  const addForm=window._showAddUser?card(`<div class="p20"><div class="fw700 fs14 mb12">Add New User</div>
    <div class="grid3">
      ${inp('Full Name *','au-name','')}${inp('Email *','au-email','')}${inp('Phone','au-phone','')}
      ${inp('Temp Password','au-pw','ettr2024')}
      ${sel('App Role','au-role',ROLES.DRIVER,Object.values(ROLES))}
      ${sel('Carrier Role','au-crole','Driver',['Driver','Lease Operator','Owner Operator','Carrier Admin'])}
    </div>
    <div class="flex gap8 mt16">${btn('Create User','handleAction(\'add-user\',{})','btn-blue btn-md')}${btn('Cancel','window._showAddUser=false;render()','btn-slate btn-md')}</div>
  </div>`):'';

  return `<div class="section">
    <div class="flex justify-between items-center wrap gap12">
      <div class="page-title">⚙️ ${isDv?'System Admin':'Carrier Admin'}</div>
      ${btn('+ Add User','window._showAddUser=!window._showAddUser;render()','btn-blue btn-md')}
    </div>
    ${card(`<div class="p20"><div class="fw700 fs14 mb12">🏢 Edgerton Truck & Trailer Repair</div>
      <div class="grid3">
        ${[['DOT','US DOT 1978980'],['HQ','Bonduel, WI'],['Active Drivers',STATE.users.filter(u=>!u.deleted).length]].map(([k,v])=>`<div><div class="fs11 c-slate">${k}</div><div class="fs13 mt4">${esc(String(v))}</div></div>`).join('')}
      </div>
    </div>`)}
    ${addForm}
    ${STATE.users.map(usr=>card(`<div class="p16 flex justify-between items-center wrap gap8" style="opacity:${usr.deleted?.5:1}">
      <div class="flex items-center gap12">
        <div class="user-avatar" style="width:40px;height:40px;background:${usr.id==='tim_smith'?'#334155':'#1d4ed8'};font-size:14px">${usr.name[0]}</div>
        <div>
          <div class="fw600 fs13">${esc(usr.name)} ${usr.id===u.id?'<span style="color:#64748b;font-size:11px">(you)</span>':''}</div>
          <div class="fs11 c-slate">${esc(usr.email)} • ${esc(usr.role)}</div>
        </div>
      </div>
      <div class="flex gap8 items-center">
        ${badge(usr.deleted?'Inactive':'Active',usr.deleted?'#7f1d1d':'#065f46')}
        ${isDv&&usr.id!==u.id?`<button class="btn btn-sm ${usr.deleted?'btn-green':'btn-red'}" data-action="toggle-user" data-id="${usr.id}">${usr.deleted?'Reactivate':'Deactivate'}</button>`:''}
      </div>
    </div>`)).join('')}
  </div>`;
}

function addUser(){
  const name=document.getElementById('au-name')?.value?.trim();
  const email=document.getElementById('au-email')?.value?.trim();
  if(!name||!email)return;
  const u={id:uid(),name,email,phone:document.getElementById('au-phone')?.value||'',password:document.getElementById('au-pw')?.value||'ettr2024',role:document.getElementById('au-role')?.value||ROLES.DRIVER,carrierRole:document.getElementById('au-crole')?.value||'Driver',cdl:'',cdlState:'',cdlExpiry:'',medCardExpiry:'',hireDate:'',address:'',emergencyContact:'',emergencyPhone:'',truckId:'',deleted:false};
  STATE.users.push(u);save('ettr_users',STATE.users);window._showAddUser=false;render();
}
function toggleUser(id){
  if(id===STATE.user.id){alert('Cannot deactivate yourself.');return;}
  const u=STATE.users.find(x=>x.id===id);
  if(!u.deleted&&(!confirm(`Deactivate ${u.name}?`)||!confirm('DOUBLE confirm?')))return;
  STATE.users=STATE.users.map(x=>x.id===id?{...x,deleted:!x.deleted}:x);
  save('ettr_users',STATE.users);render();
}

// ── REPORT CONTROLS (live) ────────────────────────────────────────────────────
document.addEventListener('change', e => {
  if(e.target.id==='rpt-year'){window._rptYear=parseInt(e.target.value);render();}
  if(e.target.id==='rpt-month'){window._rptMonth=parseInt(e.target.value);render();}
  if(e.target.id==='fu-gal'||e.target.id==='fu-ppg'){
    const g=parseFloat(document.getElementById('fu-gal')?.value||0);
    const p=parseFloat(document.getElementById('fu-ppg')?.value||0);
    if(g&&p){const t=document.getElementById('fu-total');if(t)t.value=(g*p).toFixed(2);}
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────────
render();
</script>

</body>
</html>
