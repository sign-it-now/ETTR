// ── STORAGE ──────────────────────────────────────────────────────────────────
function useLS(key, initial) {
const [val, setVal] = useState(() => {
try { const s=localStorage.getItem(key); return s?JSON.parse(s):initial; } catch(e){return initial;}
});
const save = useCallback((v) => {
const nv = typeof v===‘function’?v(val):v;
setVal(nv);
try { localStorage.setItem(key, JSON.stringify(nv)); } catch(e){}
},[key,val]);
return [val, save];
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({user,allData,setPage}) {
const {loads,pettyCash,serviceRecords,trucks} = allData;
const myLoads = loads.filter(l=>!l.deleted&&(user.role===ROLES.CARRIER_ADMIN||l.driverId===user.id));
const activeLoads = myLoads.filter(l=>![‘Paid’,‘Cancelled’,‘Searching’].includes(l.status));
const paidLoads = myLoads.filter(l=>l.status===‘Paid’);
const revenue = paidLoads.reduce((s,l)=>s+(parseFloat(l.rate)||0),0);
const myTruck = trucks.find(t=>t.driverId===user.id);
const timPc = pettyCash.filter(p=>!p.deleted&&p.forDriver===‘tim_smith’);
const pcOwed = timPc.filter(p=>!p.paid).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
const upcoming = serviceRecords.filter(s=>!s.deleted&&s.truckId===myTruck?.id&&s.nextDue&&daysUntil(s.nextDue)<=30&&daysUntil(s.nextDue)>=0);
const cdlDays = daysUntil(user.cdlExpiry);
const medDays = daysUntil(user.medCardExpiry);
return (
<div style={{display:‘flex’,flexDirection:‘column’,gap:20}}>
<div>
<h1 style={{fontSize:24,fontWeight:800,margin:0}}>Welcome back, {user.name.split(’ ‘)[0]} 👋</h1>
<p style={{color:’#64748b’,fontSize:13,margin:‘4px 0 0’}}>{new Date().toLocaleDateString(‘en-US’,{weekday:‘long’,month:‘long’,day:‘numeric’,year:‘numeric’})}</p>
</div>
{(upcoming.length>0||pcOwed>0||(cdlDays!==null&&cdlDays<60)||(medDays!==null&&medDays<60))&&(
<div style={{display:‘flex’,flexDirection:‘column’,gap:8}}>
{upcoming.map(s=><div key={s.id} style={{background:‘rgba(180,83,9,0.2)’,border:‘1px solid rgba(180,83,9,0.4)’,borderRadius:8,padding:‘10px 14px’,color:’#fbbf24’,fontSize:13}}>⚠️ {s.type} due in {daysUntil(s.nextDue)} days</div>)}
{cdlDays!==null&&cdlDays<60&&<div style={{background:‘rgba(220,38,38,0.15)’,border:‘1px solid rgba(220,38,38,0.4)’,borderRadius:8,padding:‘10px 14px’,color:’#f87171’,fontSize:13}}>🛡️ CDL expires in {cdlDays} days!</div>}
{medDays!==null&&medDays<60&&<div style={{background:‘rgba(220,38,38,0.15)’,border:‘1px solid rgba(220,38,38,0.4)’,borderRadius:8,padding:‘10px 14px’,color:’#f87171’,fontSize:13}}>🛡️ Medical Card expires in {medDays} days!</div>}
{pcOwed>0&&(
<div onClick={()=>setPage(‘petty_cash’)} style={{background:‘rgba(234,88,12,0.15)’,border:‘1px solid rgba(234,88,12,0.4)’,borderRadius:8,padding:‘10px 14px’,color:’#fb923c’,fontSize:13,cursor:‘pointer’,display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’}}>
<span>💰 {user.id===‘tim_smith’?`You owe Bruce ${fmt$(pcOwed)}`:`Tim owes you ${fmt$(pcOwed)}`}</span>
<span style={{fontSize:12,textDecoration:‘underline’}}>View →</span>
</div>
)}
</div>
)}
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(150px,1fr))’,gap:12}}>
<StatCard label="Active Loads" value={activeLoads.length} color="#60a5fa"/>
<StatCard label=“Total Revenue” value={fmt$(revenue)} sub={`${paidLoads.length} paid`} color=”#4ade80”/>
<StatCard label={user.id===‘tim_smith’?‘You Owe Bruce’:‘Tim Owes You’} value={fmt$(pcOwed)} color=”#fb923c”/>

<div key={l.id} style={{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,padding:‘8px 0’,borderBottom:‘1px solid #1e293b’}}>

<div style={{textAlign:‘right’}}><Badge label={l.status} color={STATUS_COLORS[l.status]}/><p style={{margin:‘2px 0 0’,fontSize:12,color:’#4ade80’,fontWeight:600}}>{fmt$(l.rate)}</p></div>

))

<span style={{color:’#64748b’}}>{k}</span><span>{v}</span>
</div>
))}
</div>
</Card>
)}
</div>

);

<div style={{padding:14,display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,flexWrap:‘wrap’,gap:8}}>
<div>
<p style={{margin:0,fontSize:14,fontWeight:700}}>{fmtDate(l.date)}</p>
<div style={{display:‘flex’,gap:12,marginTop:4,flexWrap:‘wrap’}}>
{l.hosDriving&&<span style={{fontSize:11,color:’#94a3b8’}}>🚛 Driving: {l.hosDriving}h</span>}
{l.hosOnDuty&&<span style={{fontSize:11,color:’#94a3b8’}}>⚙️ On Duty: {l.hosOnDuty}h</span>}
{l.hosSleeper&&<span style={{fontSize:11,color:’#94a3b8’}}>😴 Sleeper: {l.hosSleeper}h</span>}
</div>
{l.fileName&&<p style={{margin:‘4px 0 0’,fontSize:11,color:’#60a5fa’}}>📄 {l.fileName}</p>}
</div>
{l.fileData&&<a href={l.fileData} download={l.fileName} style={{color:’#60a5fa’,fontSize:12}}>⬇️ View</a>}
</div>
</Card>
))}
</div>
</div>
);
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function ReportsModule({currentUser,loads,users}) {
const isAdmin=currentUser.role===ROLES.DEVELOPER||currentUser.role===ROLES.CARRIER_ADMIN;
const [period,setPeriod]=useState(‘monthly’);
const [year,setYear]=useState(new Date().getFullYear());
const [month,setMonth]=useState(new Date().getMonth()+1);
const filterLoads=l=>{
if(l.deleted)return false;
if(!isAdmin&&l.driverId!==currentUser.id)return false;
const d=new Date(((l.deliveryDate||l.pickupDate)||‘2000-01-01’)+‘T12:00:00’);
if(period===‘yearly’)return d.getFullYear()===year;
if(period===‘monthly’)return d.getFullYear()===year&&d.getMonth()+1===month;
if(period===‘weekly’){const n=new Date();return d>=(new Date(n-7*86400000));}
if(period===‘daily’)return (l.deliveryDate||l.pickupDate)===today();
return true;
};
const filtered=loads.filter(filterLoads);
const paid=filtered.filter(l=>l.status===‘Paid’);
const revenue=paid.reduce((s,l)=>s+(parseFloat(l.rate)||0),0);
const miles=filtered.reduce((s,l)=>s+(parseFloat(l.miles)||0),0);
const MONTHS=[‘Jan’,‘Feb’,‘Mar’,‘Apr’,‘May’,‘Jun’,‘Jul’,‘Aug’,‘Sep’,‘Oct’,‘Nov’,‘Dec’];
return (
<div style={{display:‘flex’,flexDirection:‘column’,gap:20}}>
<h1 style={{fontSize:22,fontWeight:800,margin:0}}>📊 Reports</h1>
<Card>
<div style={{padding:16,display:‘flex’,gap:12,flexWrap:‘wrap’,alignItems:‘flex-end’}}>
<div>
<p style={{color:’#64748b’,fontSize:11,margin:‘0 0 4px’}}>Period</p>
<div style={{display:‘flex’,gap:4}}>
{[‘daily’,‘weekly’,‘monthly’,‘yearly’].map(p=>(
<button key={p} onClick={()=>setPeriod(p)} style={{padding:‘6px 12px’,borderRadius:7,border:‘none’,cursor:‘pointer’,fontSize:12,fontWeight:600,background:period===p?’#7c3aed’:’#334155’,color:’#fff’}}>
{p.charAt(0).toUpperCase()+p.slice(1)}
</button>
))}
</div>
</div>
{(period===‘monthly’||period===‘yearly’)&&<Sel label=“Year” value={String(year)} onChange={v=>setYear(parseInt(v))} options={[‘2024’,‘2025’,‘2026’,‘2027’]}/>}
{period===‘monthly’&&<Sel label=“Month” value={String(month)} onChange={v=>setMonth(parseInt(v))} options={MONTHS.map((_,i)=>String(i+1))}/>}
</div>
</Card>
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(150px,1fr))’,gap:12}}>
<StatCard label="Revenue" value={fmt$(revenue)} color="#4ade80"/>
<StatCard label=“Total Loads” value={filtered.length} sub={`${paid.length} paid`} color=”#60a5fa”/>
<StatCard label="Total Miles" value={miles>0?miles.toLocaleString():0} color=”#fbbf24”/>
<StatCard label="Rev/Mile" value={miles>0?`$${(revenue/miles).toFixed(2)}`:’-’} color=”#c084fc”/>
</div>
<Card>
<div style={{padding:20}}>
<h3 style={{margin:‘0 0 16px’,fontSize:14,fontWeight:700}}>Load Breakdown</h3>
{filtered.length===0?<p style={{color:’#475569’,fontSize:13}}>No loads in this period</p>:filtered.map(l=>(
<div key={l.id} style={{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,padding:‘10px 0’,borderBottom:‘1px solid #1e293b’,flexWrap:‘wrap’,gap:8}}>
<div>
<p style={{margin:0,fontSize:13,fontWeight:600}}>{l.origin} → {l.destination}</p>
<p style={{margin:‘2px 0 0’,fontSize:11,color:’#64748b’}}>{l.broker} • {fmtDate(l.pickupDate)}</p>
</div>
<div style={{textAlign:‘right’,display:‘flex’,gap:8,alignItems:‘center’}}>
<p style={{margin:0,fontSize:14,fontWeight:700,color:’#4ade80’}}>{fmt$(l.rate)}</p>
<Badge label={l.status} color={STATUS_COLORS[l.status]}/>
</div>
</div>
))}
</div>
</Card>
</div>
);
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function AdminModule({currentUser,users,saveUsers,trucks}) {
const isDev=currentUser.role===ROLES.DEVELOPER;
const [showAdd,setShowAdd]=useState(false);
const [form,setForm]=useState({name:’’,email:’’,phone:’’,password:‘ettr2024’,role:ROLES.DRIVER,carrierRole:‘Driver’});
const set=(k,v)=>setForm(f=>({…f,[k]:v}));
const addUser=()=>{if(!form.name||!form.email)return;saveUsers(prev=>[{id:uid(),…form,deleted:false},…prev]);setShowAdd(false);};
const toggleDelete=id=>{if(id===currentUser.id){alert(‘Cannot delete yourself.’);return;}const u=users.find(u=>u.id===id);if(!u.deleted){if(!window.confirm(`Deactivate ${u.name}?`)||!window.confirm(‘DOUBLE confirm?’))return;}saveUsers(prev=>prev.map(u=>u.id===id?{…u,deleted:!u.deleted}:u));};
return (
<div style={{display:‘flex’,flexDirection:‘column’,gap:20}}>
<div style={{display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,flexWrap:‘wrap’,gap:12}}>
<h1 style={{fontSize:22,fontWeight:800,margin:0}}>⚙️ {isDev?‘System Admin’:‘Carrier Admin’}</h1>
<Btn onClick={()=>setShowAdd(!showAdd)} color=“blue”>+ Add User</Btn>
</div>
<Card>
<div style={{padding:20}}>
<h3 style={{margin:‘0 0 12px’,fontSize:14,fontWeight:700}}>🏢 {CARRIER.name}</h3>
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(150px,1fr))’,gap:8,fontSize:13}}>
{[[‘DOT’,CARRIER.dot],[‘HQ’,CARRIER.address],[‘Active Drivers’,users.filter(u=>!u.deleted).length]].map(([k,v])=>(
<div key={k}><p style={{color:’#64748b’,fontSize:11,margin:0}}>{k}</p><p style={{margin:‘2px 0 0’}}>{v}</p></div>
))}
</div>
</div>
</Card>
{showAdd&&(
<Card>
<div style={{padding:20}}>
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(200px,1fr))’,gap:10}}>
<Inp label=“Full Name *” value={form.name} onChange={v=>set(‘name’,v)}/>
<Inp label=“Email *” value={form.email} onChange={v=>set(‘email’,v)}/>
<Inp label=“Phone” value={form.phone} onChange={v=>set(‘phone’,v)}/>
<Inp label=“Temp Password” value={form.password} onChange={v=>set(‘password’,v)}/>
<Sel label=“App Role” value={form.role} onChange={v=>set(‘role’,v)} options={Object.values(ROLES)}/>
<Sel label=“Carrier Role” value={form.carrierRole} onChange={v=>set(‘carrierRole’,v)} options={[‘Driver’,‘Lease Operator’,‘Owner Operator’,‘Carrier Admin’]}/>
</div>
<div style={{display:‘flex’,gap:8,marginTop:14}}><Btn onClick={addUser} color="blue">Create User</Btn><Btn onClick={()=>setShowAdd(false)} color=“slate”>Cancel</Btn></div>
</div>
</Card>
)}
<div style={{display:‘flex’,flexDirection:‘column’,gap:10}}>
{users.map(u=>(
<Card key={u.id}>
<div style={{padding:16,display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,gap:8,flexWrap:‘wrap’,opacity:u.deleted?0.5:1}}>
<div style={{display:‘flex’,alignItems:‘center’,gap:12}}>
<div style={{width:40,height:40,borderRadius:‘50%’,background:u.id===‘tim_smith’?’#334155’:’#1d4ed8’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontWeight:700,fontSize:14}}>{u.name[0]}</div>
<div>
<p style={{margin:0,fontSize:13,fontWeight:600}}>{u.name} {u.id===currentUser.id&&<span style={{color:’#64748b’,fontWeight:400,fontSize:11}}>(you)</span>}</p>
<p style={{margin:‘2px 0 0’,fontSize:11,color:’#64748b’}}>{u.email} • {u.role}</p>
</div>
</div>
<div style={{display:‘flex’,gap:8,alignItems:‘center’}}>
<Badge label={u.deleted?‘Inactive’:‘Active’} color={u.deleted?’#7f1d1d’:’#065f46’}/>
{isDev&&u.id!==currentUser.id&&<button onClick={()=>toggleDelete(u.id)} style={{padding:‘4px 10px’,borderRadius:6,border:‘none’,cursor:‘pointer’,fontSize:12,background:u.deleted?’#15803d’:’#7f1d1d’,color:’#fff’}}>{u.deleted?‘Reactivate’:‘Deactivate’}</button>}
</div>
</div>
</Card>
))}
</div>
</div>
);
}

// ── TRAILERS ──────────────────────────────────────────────────────────────────
function TrailersModule({currentUser,trailers,saveTrailers}) {
const isAdmin=currentUser.role===ROLES.DEVELOPER||currentUser.role===ROLES.CARRIER_ADMIN;
const [showAdd,setShowAdd]=useState(false);
const [form,setForm]=useState({number:’’,type:‘Dry Van’,year:’’,make:’’,vin:’’,plate:’’,state:’’,length:‘53’,annualInspection:’’,notes:’’});
const set=(k,v)=>setForm(f=>({…f,[k]:v}));
const active=trailers.filter(t=>!t.deleted);
const addTrailer=()=>{if(!form.number)return;saveTrailers(prev=>[{id:uid(),…form,deleted:false},…prev]);setShowAdd(false);};
const del=id=>{if(!window.confirm(‘Delete?’)||!window.confirm(‘DOUBLE confirm?’))return;saveTrailers(prev=>prev.map(t=>t.id===id?{…t,deleted:true}:t));};
return (
<div style={{display:‘flex’,flexDirection:‘column’,gap:16}}>
<div style={{display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,flexWrap:‘wrap’,gap:12}}>
<div><h1 style={{fontSize:22,fontWeight:800,margin:0}}>🔲 Trailers</h1><p style={{color:’#64748b’,fontSize:13,margin:‘2px 0 0’}}>{active.length} in fleet</p></div>
{isAdmin&&<Btn onClick={()=>setShowAdd(!showAdd)} color=“blue”>+ Add Trailer</Btn>}
</div>
{showAdd&&(
<Card>
<div style={{padding:20}}>
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(160px,1fr))’,gap:10}}>
<Inp label=“Trailer # *” value={form.number} onChange={v=>set(‘number’,v)} placeholder=“e.g. T-101”/>
<Sel label=“Type” value={form.type} onChange={v=>set(‘type’,v)} options={TRAILER_TYPES}/>
<Inp label=“Year” type=“number” value={form.year} onChange={v=>set(‘year’,v)}/>
<Inp label=“VIN” value={form.vin} onChange={v=>set(‘vin’,v)}/>
<Inp label=“License Plate” value={form.plate} onChange={v=>set(‘plate’,v)}/>
<Inp label=“State” value={form.state} onChange={v=>set(‘state’,v)}/>
<Inp label=“Length (ft)” value={form.length} onChange={v=>set(‘length’,v)}/>
<Inp label=“Annual Inspection” type=“date” value={form.annualInspection} onChange={v=>set(‘annualInspection’,v)}/>
</div>
<div style={{display:‘flex’,gap:8,marginTop:14}}><Btn onClick={addTrailer} color="blue">Save Trailer</Btn><Btn onClick={()=>setShowAdd(false)} color=“slate”>Cancel</Btn></div>
</div>
</Card>
)}
<div style={{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(280px,1fr))’,gap:12}}>
{active.length===0&&<Card><div style={{padding:40,textAlign:‘center’,color:’#475569’}}>No trailers in fleet yet</div></Card>}
{active.map(t=>{
const inspDays=daysUntil(t.annualInspection);
return (
<Card key={t.id}>
<div style={{padding:16}}>
<div style={{display:‘flex’,justifyContent:‘space-between’,marginBottom:10}}>
<div>
<p style={{margin:0,fontSize:18,fontWeight:800}}>{t.number}</p>
<Badge label={t.type} color="#1d4ed8"/>
</div>
{isAdmin&&currentUser.role===ROLES.DEVELOPER&&<button onClick={()=>del(t.id)} style={{background:‘none’,border:‘none’,color:’#475569’,cursor:‘pointer’}}>🗑️</button>}
</div>
<div style={{display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:4,fontSize:12}}>
{t.year&&<div><span style={{color:’#64748b’}}>Year: </span>{t.year}</div>}
{t.vin&&<div><span style={{color:’#64748b’}}>VIN: </span>{t.vin}</div>}
{t.plate&&<div><span style={{color:’#64748b’}}>Plate: </span>{t.plate}</div>}
{t.length&&<div><span style={{color:’#64748b’}}>Length: </span>{t.length}ft</div>}
</div>
{t.annualInspection&&(
<div style={{marginTop:10,padding:‘6px 10px’,borderRadius:7,fontSize:11,background:inspDays!==null&&inspDays<30?‘rgba(185,28,28,0.2)’:inspDays!==null&&inspDays<90?‘rgba(180,83,9,0.2)’:‘rgba(255,255,255,0.05)’,color:inspDays!==null&&inspDays<30?’#f87171’:inspDays!==null&&inspDays<90?’#fbbf24’:’#64748b’}}>
📅 Inspection: {fmtDate(t.annualInspection)} {inspDays!==null&&`(${inspDays<0?'EXPIRED':inspDays+' days'})`}
</div>
)}
</div>
</Card>
);
})}
</div>
</div>
);
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
const [currentUser,setCurrentUser]=useState(null);
const [page,setPage]=useState(‘dashboard’);
const [collapsed,setCollapsed]=useState(window.innerWidth<768);
const [users,saveUsers]=useLS(‘ettr_users’,INITIAL_USERS);
const [pettyCash,savePettyCash]=useLS(‘ettr_petty_cash’,INITIAL_PETTY_CASH);
const [loads,saveLoads]=useLS(‘ettr_loads’,[]);
const [trailers,saveTrailers]=useLS(‘ettr_trailers’,[]);
const [serviceRecords,saveServiceRecords]=useLS(‘ettr_service’,[]);
const [documents,saveDocuments]=useLS(‘ettr_documents’,[]);
const [trucks,saveTrucks]=useLS(‘ettr_trucks’,INITIAL_TRUCKS);

if(!currentUser) return <LoginScreen users={users} onLogin={u=>{setCurrentUser(u);setPage(‘dashboard’);}}/>;
const liveUser=users.find(u=>u.id===currentUser.id)||currentUser;
const allData={loads,pettyCash,serviceRecords,trailers,trucks,documents,users};
const sideW=collapsed?60:220;

const renderPage=()=>{
switch(page){
case ‘dashboard’: return <Dashboard user={liveUser} allData={allData} setPage={setPage}/>;
case ‘profile’: return <ProfileModule user={liveUser} users={users} saveUsers={saveUsers} currentUser={liveUser}/>;
case ‘truck’: return <TruckModule user={liveUser} trucks={trucks} saveTrucks={saveTrucks}/>;
case ‘petty_cash’: return <PettyCashModule currentUser={liveUser} users={users} pettyCash={pettyCash} savePettyCash={savePettyCash}/>;
case ‘loads’: return <LoadsModule currentUser={liveUser} users={users} loads={loads} saveLoads={saveLoads} trucks={trucks}/>;
case ‘trailers’: return <TrailersModule currentUser={liveUser} trailers={trailers} saveTrailers={saveTrailers}/>;
case ‘service’: return <ServiceModule currentUser={liveUser} serviceRecords={serviceRecords} saveServiceRecords={saveServiceRecords} trucks={trucks}/>;
case ‘documents’: return <DocumentsModule currentUser={liveUser} documents={documents} saveDocuments={saveDocuments} users={users}/>;
case ‘fuel’: return <FuelModule currentUser={liveUser} trucks={trucks}/>;
case ‘eld’: return <ELDModule currentUser={liveUser}/>;
case ‘reports’: return <ReportsModule currentUser={liveUser} loads={loads} users={users}/>;
case ‘admin’: return <AdminModule currentUser={liveUser} users={users} saveUsers={saveUsers} trucks={trucks} saveTrucks={saveTrucks}/>;
default: return <Dashboard user={liveUser} allData={allData} setPage={setPage}/>;
}
};

return (
<div style={{minHeight:‘100vh’,background:’#0a0f1e’}}>
<Sidebar user={liveUser} page={page} setPage={setPage} onLogout={()=>setCurrentUser(null)} collapsed={collapsed} setCollapsed={setCollapsed}/>
<main style={{marginLeft:sideW,transition:‘margin 0.2s’,padding:24,minHeight:‘100vh’}}>
<div style={{maxWidth:1100,margin:‘0 auto’}}>
{renderPage()}
</div>
</main>
</div>
);
}

ReactDOM.render(<App/>, document.getElementById(‘root’));
</script>

</body>
